name: Meister
options:
  bundleIdPrefix: com.merados.meister
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  knownRegions:
    - en
    - de
    - Base

packages:
  MeisterKit:
    path: Packages/MeisterKit
  MeradOSDesign4:
    path: ../meradOS/merados-design4

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: K63X3ZTV3Q
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "34"

targets:
  # iPhone + iPad (adaptive SwiftUI) + Mac Catalyst
  MeisterIOS:
    type: application
    platform: iOS
    sources:
      - path: MeisterIOS
      # Cross-platform Design2026 components (skip Mac-only Dashboard).
      - path: MeisterMacOS/Design2026/ContinuousSquircle.swift
        group: MeisterMacOS/Design2026
      - path: MeisterMacOS/Design2026/HealthRing.swift
        group: MeisterMacOS/Design2026
      - path: MeisterMacOS/Design2026/NumberFlow.swift
        group: MeisterMacOS/Design2026
      - path: MeisterMacOS/Design2026/SparkleBurst.swift
        group: MeisterMacOS/Design2026
      - path: MeisterMacOS/Design2026/AuroraCard.swift
        group: MeisterMacOS/Design2026
    info:
      path: MeisterIOS/Info.plist
      properties:
        CFBundleDisplayName: Meister
        CFBundleName: Meister
        NSPhotoLibraryUsageDescription: "Meister scans your photos on-device to find duplicates, screenshots and blurry images. Nothing leaves your phone."
        NSPhotoLibraryAddUsageDescription: "Meister may restore photos you recently deleted by mistake."
        NSContactsUsageDescription: "Meister finds duplicate contacts and merges them. Processing is 100% on-device — no upload."
        NSCalendarsUsageDescription: "Meister helps archive old events and empty calendars."
        NSLocationWhenInUseUsageDescription: "Used only to read the Wi-Fi network name during network diagnostics."
        UILaunchScreen: {}
        CFBundleIconName: AppIcon
        CFBundleLocalizations:
          - en
          - de
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merados.meister.ios
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
    dependencies:
      - target: MeisterWidget
      - package: MeradOSDesign4

  # Native macOS app — standalone, shells out to bash-meister + native Swift modules
  MeisterMacOS:
    type: application
    platform: macOS
    sources:
      - path: MeisterMacOS
    info:
      path: MeisterMacOS/Info.plist
      properties:
        CFBundleDisplayName: Meister
        CFBundleName: Meister
        NSContactsUsageDescription: "Meister inspects your local AddressBook to find bloat and repair sync corruption. Nothing leaves your Mac."
        NSAppleEventsUsageDescription: "Meister uses AppleScript to quit Contacts.app cleanly during maintenance."
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleLocalizations:
          - en
          - de
        CFBundleURLTypes:
          - CFBundleURLName: com.merados.meister.url
            CFBundleURLSchemes:
              - meister
    settings:
      base:
        PRODUCT_NAME: Meister
        PRODUCT_BUNDLE_IDENTIFIER: com.merados.meister.macos
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: MeisterKit
      - package: MeradOSDesign4

  MeisterWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MeisterWidget
      - path: MeisterIOS/Core/MeisterActivity.swift
    info:
      path: MeisterWidget/Info.plist
      properties:
        CFBundleDisplayName: Meister
        CFBundleName: Meister
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merados.meister.ios.widget
        SKIP_INSTALL: YES

  MeisterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MeisterTests
    dependencies:
      - target: MeisterIOS
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/MeisterIOS.app/MeisterIOS

  MeisterMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MeisterMacOSTests
    dependencies:
      - target: MeisterMacOS
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Meister.app/Contents/MacOS/Meister

schemes:
  MeisterIOS:
    build:
      targets:
        MeisterIOS: all
    test:
      targets:
        - MeisterTests
  MeisterMacOS:
    build:
      targets:
        MeisterMacOS: all
    test:
      targets:
        - MeisterMacOSTests
